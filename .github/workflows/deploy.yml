name: Deploy Next.js

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }} # Make sure this matches Step 1!
          script: |
            set -e
            
            # Navigate to project
            cd /home/ubuntu/hasna/next_todolist
            
            # This will now pull instantly via token without requiring any SSH keys
            git pull origin main
            
            # Build and launch
            npm install
            npm run build
            pm2 restart next-todolist
            pm2 save