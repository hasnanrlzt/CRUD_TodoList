name: Deploy Next.js

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            # Force Git to use your custom identity key cleanly
            export GIT_SSH_COMMAND="ssh -i /home/ubuntu/.ssh/hasna/id_rsa -o StrictHostKeyChecking=no"
            
            # Use absolute path instead of tilde (~)
            cd /home/ubuntu/hasna/next_todolist
            
            # Pull code
            git pull origin main
            
            # Build and deploy
            npm install
            npm run build
            pm2 restart next-todolist
            pm2 save